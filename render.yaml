# Render.com blueprint — free always-on Python host for the MailFlow backend.
# Push this repo to GitHub, then in Render: New + → Blueprint → pick this repo.
services:
  - type: web
    name: mailflow-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGINS
        # Your Vercel frontend origin (so the API accepts its requests).
        value: "https://mail-flow-xi.vercel.app"
