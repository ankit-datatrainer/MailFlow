<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#fff7ed;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fff7ed;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
            <tr>
              <td style="background:#ea580c;padding:28px 32px;color:#ffffff;font-size:24px;font-weight:bold;text-align:center;">
                A special gift for you, {name} 🎁
              </td>
            </tr>
            <tr>
              <td style="padding:32px;color:#333333;font-size:16px;line-height:1.6;text-align:center;">
                <p>Hi {name},</p>
                <p>As a thank-you for being with us, here's an exclusive deal just for you:</p>
                <p style="font-size:30px;font-weight:bold;color:#ea580c;margin:24px 0;">20% OFF</p>
                <p>Use code <b>THANKYOU20</b> at checkout. Hurry &mdash; it expires soon!</p>
                <p style="margin-top:28px;">
                  <a href="https://example.com" style="background:#ea580c;color:#ffffff;text-decoration:none;padding:14px 28px;border-radius:6px;display:inline-block;font-weight:bold;">Claim Your Offer</a>
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 32px;background:#fafafa;color:#999999;font-size:12px;">
                Sent to {email}. Reply STOP to unsubscribe.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
